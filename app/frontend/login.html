<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Algorithmic Trading Platform</title>

    <link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->

    <div class="left">

        <h1>Build, test, trade.</h1>

        <p>
            Backtest strategies on real market data before
            risking a single dollar.
        </p>

        <div class="feature">
            ✅ Backtesting on historical data
        </div>

        <div class="feature">
            ✅ Paper Trading
        </div>

        <div class="feature">
            ✅ Portfolio Analytics
        </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="right">

        <div class="card">

            <h2>Welcome Back</h2>

            <p class="subtitle">
                Sign in to your trading desk
            </p>

            <button class="google-btn">
                Continue with Google
            </button>

            <div class="divider">
                <span>OR</span>
            </div>

            <input
                type="text"
                id="username"
                placeholder="Username or Email"
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
            >

            <button
                id="loginBtn"
                class="login-btn"
            >
                Log In
            </button>

            <p class="bottom">

                Don't have an account?

                <a href="/signup">

                    Create Account

                </a>

            </p>

        </div>

    </div>

</div>

<script src="/js/app.js"></script>

</body>

</html>
