{% extends "base.html" %}

{% block content %}

<h1>⚙️ Settings</h1>

<p>
Customize your trading platform preferences.
</p>

<br>

<div class="card">

    <h2>👤 Profile</h2>

    <br>

    <label>Username</label>

    <input
        type="text"
        value="{{ session['user'] }}"
        readonly
    >

    <br><br>

    <label>Email</label>

    <input
        type="email"
        placeholder="user@email.com"
    >

    <br><br>

    <button class="primary-btn">
        Change Password
    </button>

</div>

<br>

<div class="card">

    <h2>🎨 Appearance</h2>

    <br>

    <label>Theme</label>

    <select id="theme">

        <option selected>Dark</option>

        <option>Light</option>

    </select>

</div>

<br>

<div class="card">

    <h2>💰 Trading Defaults</h2>

    <br>

    <div class="cards">

        <div class="card">

            <label>Default Capital ($)</label>

            <input
                id="defaultCapital"
                type="number"
                value="10000"
            >

        </div>

        <div class="card">

            <label>Commission (%)</label>

            <input
                id="commission"
                type="number"
                step="0.01"
                value="0.10"
            >

        </div>

        <div class="card">

            <label>Slippage (%)</label>

            <input
                id="slippage"
                type="number"
                step="0.01"
                value="0.05"
            >

        </div>

    </div>

    <br>

    <div class="cards">

        <div class="card">

            <label>Stop Loss (%)</label>

            <input
                id="stoploss"
                type="number"
                value="5"
            >

        </div>

        <div class="card">

            <label>Take Profit (%)</label>

            <input
                id="takeprofit"
                type="number"
                value="10"
            >

        </div>

    </div>

</div>

<br>

<div class="card">

    <h2>📊 Dashboard Preferences</h2>

    <br>

    <label>Default Asset Class</label>

    <select>

        <option selected>Stocks</option>

        <option>Crypto</option>

        <option>Forex</option>

        <option>Indices</option>

        <option>Commodities</option>

    </select>

    <br><br>

    <label>Default Strategy</label>

    <select>

        <option selected>Moving Average Crossover</option>

        <option>RSI Strategy</option>

        <option>MACD Strategy</option>

        <option>Bollinger Bands</option>

    </select>

</div>

<br>

<div class="card">

    <h2>🔔 Notifications</h2>

    <br>

    <label>
        <input type="checkbox" checked>
        Email Alerts
    </label>

    <br><br>

    <label>
        <input type="checkbox" checked>
        AI Signal Alerts
    </label>

    <br><br>

    <label>
        <input type="checkbox">
        Trade Alerts
    </label>

</div>

<br>

<div class="card">

    <h2>🔒 Account</h2>

    <br>

    <button id="saveSettingsBtn" class="primary-btn">
    💾 Save Settings
    </button>

    <br><br>

    <a href="/logout">

        <button style="background:#ef4444;color:white;padding:10px 18px;border:none;border-radius:8px;cursor:pointer;">

            Logout

        </button>

    </a>

</div>
<script src="/js/settings.js"></script>
{% endblock %}
