{% extends "base.html" %}
{% block content %}

<!-- ── Page Header ─────────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-left">
    <h1>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </h1>
    <p>Manage your account, trading defaults &amp; platform preferences</p>
  </div>
  <div class="topbar-right">
    <button id="saveSettingsBtn" class="primary-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save Settings
    </button>
  </div>
</div>

<!-- ── Profile ───────────────────────────────────────────────── -->
<div class="settings-section mb-16">
  <h2>
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profile
  </h2>
  <div class="settings-grid">
    <div class="input-group">
      <label>Username</label>
      <input type="text" value="{{ session['user'] }}" readonly style="color:var(--text-muted);">
    </div>
    <div class="input-group">
      <label>Email Address</label>
      <input type="email" placeholder="user@email.com">
    </div>
    <div class="input-group" style="justify-content:flex-end;">
      <label style="visibility:hidden;">Action</label>
      <button class="btn-outline">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Change Password
      </button>
    </div>
  </div>
</div>

<!-- ── Appearance ────────────────────────────────────────────── -->
<div class="settings-section mb-16">
  <h2>
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    Appearance
  </h2>
  <div class="settings-grid">
    <div class="input-group">
      <label>Theme</label>
      <select id="theme">
        <option value="Dark" selected>Dark (Default)</option>
        <option value="Light">Light</option>
      </select>
    </div>
  </div>
</div>

<!-- ── Trading Defaults ──────────────────────────────────────── -->
<div class="settings-section mb-16">
  <h2>
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    Trading Defaults
  </h2>
  <div class="settings-grid">
    <div class="input-group">
      <label>Default Capital ($)</label>
      <input id="defaultCapital" type="number" value="10000" step="1000">
    </div>
    <div class="input-group">
      <label>Commission (%)</label>
      <input id="commission" type="number" step="0.01" value="0.10">
    </div>
    <div class="input-group">
      <label>Slippage (%)</label>
      <input id="slippage" type="number" step="0.01" value="0.05">
    </div>
    <div class="input-group">
      <label>Stop Loss (%)</label>
      <input id="stoploss" type="number" value="5">
    </div>
    <div class="input-group">
      <label>Take Profit (%)</label>
      <input id="takeprofit" type="number" value="10">
    </div>
  </div>
</div>

<!-- ── Dashboard Preferences ────────────────────────────────── -->
<div class="settings-section mb-16">
  <h2>
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Dashboard Preferences
  </h2>
  <div class="settings-grid">
    <div class="input-group">
      <label>Default Asset Class</label>
      <select>
        <option selected>Stocks</option>
        <option>Crypto</option>
        <option>Forex</option>
        <option>Indices</option>
        <option>Commodities</option>
      </select>
    </div>
    <div class="input-group">
      <label>Default Strategy</label>
      <select>
        <option selected>Moving Average Crossover</option>
        <option>RSI Strategy</option>
        <option>MACD Strategy</option>
        <option>Bollinger Bands</option>
      </select>
    </div>
  </div>
</div>

<!-- ── Notifications ─────────────────────────────────────────── -->
<div class="settings-section mb-16">
  <h2>
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    Notifications
  </h2>

  <label class="checkbox-row">
    <input type="checkbox" checked>
    <div>
      <div class="checkbox-label">Email Alerts</div>
      <div class="checkbox-sub">Receive alerts via email when thresholds are triggered</div>
    </div>
  </label>

  <label class="checkbox-row">
    <input type="checkbox" checked>
    <div>
      <div class="checkbox-label">AI Signal Alerts</div>
      <div class="checkbox-sub">Get notified when the AI model changes its BUY/SELL signal</div>
    </div>
  </label>

  <label class="checkbox-row">
    <input type="checkbox">
    <div>
      <div class="checkbox-label">Trade Execution Alerts</div>
      <div class="checkbox-sub">Notification for every executed order</div>
    </div>
  </label>

  <label class="checkbox-row">
    <input type="checkbox" checked>
    <div>
      <div class="checkbox-label">Daily Summary</div>
      <div class="checkbox-sub">End-of-day portfolio performance digest</div>
    </div>
  </label>

</div>

<!-- ── Danger Zone ───────────────────────────────────────────── -->
<div class="settings-section">
  <h2>
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    Account Actions
  </h2>
  <div style="display:flex;gap:12px;flex-wrap:wrap;">
    <a href="/logout" style="text-decoration:none;">
      <button class="btn-danger">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </a>
  </div>
</div>

<script src="/js/settings.js"></script>
{% endblock %}
