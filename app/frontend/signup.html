<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

    <div class="left">

        <h1>Start trading smarter.</h1>

        <p>
            Create your free account and access powerful
            backtesting and portfolio analytics.
        </p>

        <div class="feature">✅ Unlimited Backtesting</div>
        <div class="feature">✅ AI Strategy Testing</div>
        <div class="feature">✅ Professional Analytics</div>

    </div>

    <div class="right">

        <div class="card">

            <h2>Create Account</h2>

            <p class="subtitle">
                Join Algorithmic Trading Platform
            </p>

            <input
                type="text"
                id="username"
                placeholder="Username"
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
            >

            <input
                type="password"
                id="confirm"
                placeholder="Confirm Password"
            >

            <button
                id="signupBtn"
                class="login-btn"
            >
                Create Account
            </button>

            <p class="bottom">

                Already have an account?

                <a href="/">

                    Log In

                </a>

            </p>

        </div>

    </div>

</div>

<script src="/js/signup.js"></script>

</body>

</html>
